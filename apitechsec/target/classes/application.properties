spring.application.name=apitechsec

springdoc.swagger-ui.path=/docs
springdoc.api-docs.path=/api-docs

spring.jackson.time-zone=America/Lima

# ── Configuración de Conexión a Base de Datos (MySQL - FreeSQLDatabase) ──────
spring.datasource.url=jdbc:mysql://${DB_HOST:sql10.freesqldatabase.com}:${DB_PORT:3306}/${DB_NAME:sql10833597}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=${DB_USER:sql10833597}
spring.datasource.password=${DB_PASSWORD:BrzTlcyjYu}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Configuración JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── Pool de Conexiones HikariCP ──────────────────────────────────────────────
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# ── Carga de Archivos ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=100MB

# ── JWT propio (NO Keycloak) ─────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:TechSecSuperSecretKeyForJWTSigning2026ChangeInProduction123456}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=604800000