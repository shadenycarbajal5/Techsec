<!-- src/app/page/admin/product/product-insert/product-insert.html -->
<section class="max-w-2xl mx-auto space-y-6">
  <h1 class="text-2xl font-extrabold" style="color:var(--text)">Nuevo producto</h1>

  <div class="panel space-y-4">
    <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Nombre
      <input [ngModel]="name()" (ngModelChange)="name.set($event)" class="mt-2 w-full rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)">
    </label>

    <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Categoría
      <select [ngModel]="categoryId()" (ngModelChange)="categoryId.set($event)" class="mt-2 w-full rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)">
        <option [ngValue]="null">Selecciona una categoría</option>
        @for (c of categories(); track c.id) { <option [ngValue]="c.id">{{ c.name }}</option> }
      </select>
    </label>

    <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Descripción
      <textarea [ngModel]="description()" (ngModelChange)="description.set($event)" rows="2" class="mt-2 w-full resize-none rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)"></textarea>
    </label>

    <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Especificaciones
      <textarea [ngModel]="specifications()" (ngModelChange)="specifications.set($event)" rows="2" class="mt-2 w-full resize-none rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)"></textarea>
    </label>

    <div class="grid grid-cols-3 gap-4">
      <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Precio (S/)
        <input type="number" step="0.01" [ngModel]="price()" (ngModelChange)="price.set($event)" class="mt-2 w-full rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)">
      </label>
      <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Stock
        <input type="number" [ngModel]="stock()" (ngModelChange)="stock.set($event)" class="mt-2 w-full rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)">
      </label>
      <label class="block text-xs font-bold tracking-wider uppercase" style="color:var(--muted)">Stock mínimo
        <input type="number" [ngModel]="minStockAlert()" (ngModelChange)="minStockAlert.set($event)" class="mt-2 w-full rounded-lg p-3 text-sm bg-white" style="border:1px solid var(--line); color:var(--text)">
      </label>
    </div>

    <button (click)="submit()" [disabled]="saving()" class="w-full rounded-lg py-3 text-sm font-extrabold disabled:opacity-50" style="background:var(--gold); color:#241c05">
      {{ saving() ? 'Guardando...' : 'Guardar producto' }}
    </button>
  </div>
</section>
